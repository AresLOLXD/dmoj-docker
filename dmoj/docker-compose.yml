version: '3.7'
x-judge-tier3-base: &judge-tier3-base
  init: true
  restart: unless-stopped
  cap_add:
    - SYS_PTRACE
  networks: [site]
  depends_on: [bridged]
  command: run -c /judge-config/judge.yml bridged
x-site-static-base: &site-static-base
  build:
    context: .
    dockerfile: ./site/Dockerfile
  image: ninjaclasher/dmoj-site
  working_dir: /site/
  env_file: [environment/mysql.env, environment/site.env]
services:
  db:
    container_name: dmoj_mysql
    image: mariadb
    restart: always
    volumes:
      - ./database/:/var/lib/mysql/
    env_file: [environment/mysql.env, environment/mysql-admin.env]
    networks: [db]
  redis:
    container_name: dmoj_redis
    image: redis:alpine
    restart: always
    networks: [site]
  texoid:
    build:
      context: .
      dockerfile: ./texoid/Dockerfile
    image: ninjaclasher/dmoj-texoid
    init: true
    restart: unless-stopped
    networks: [site]
  pdfoid:
    build:
      context: .
      dockerfile: ./pdfoid/Dockerfile
    image: ninjaclasher/dmoj-pdfoid
    init: true
    restart: unless-stopped
    networks: [site]
    # SYS_ADMIN is required because pdfoid does not pass --no-sandbox to
    # Chrome (see DMOJ/pdfoid's backends/direct.py) — Chrome's own internal
    # sandbox is active and needs this capability. Mitigated by pdfoid
    # running as a non-root user (see pdfoid/Dockerfile's `USER pdfoid`).
    cap_add:
      - SYS_ADMIN
  mathoid:
    build:
      context: .
      dockerfile: ./mathoid/Dockerfile
    image: ninjaclasher/dmoj-mathoid
    init: true
    restart: unless-stopped
    volumes:
      - ./mathoid/config.yaml:/node_modules/mathoid/config.yaml
    networks: [site]
  base:
    build:
      context: .
      dockerfile: ./base/Dockerfile
    image: ninjaclasher/dmoj-base
    network_mode: none
  site:
    build:
      context: .
      dockerfile: ./site/Dockerfile
    image: ninjaclasher/dmoj-site
    init: true
    restart: unless-stopped
    volumes:
      - assets:/assets/
      - pdfcache:/pdfcache/
      - datacache:/datacache/
      - cache:/cache/
      - ./media/:/media/
      - ./problems/:/problems/
      - ./repo/:/site/:ro
    working_dir: /site/
    env_file: [environment/mysql.env, environment/site.env]
    networks: [site, nginx, db]
    depends_on: [base, db, redis]
  site-static-build:
    <<: *site-static-base
    profiles: ["tools"]
    volumes:
      - assets:/assets/
      - pdfcache:/pdfcache/
      - ./repo/:/site/:rw
    networks: [site]
  celery:
    build:
      context: .
      dockerfile: ./celery/Dockerfile
    image: ninjaclasher/dmoj-celery
    init: true
    restart: unless-stopped
    volumes:
      - pdfcache:/pdfcache/
      - datacache:/datacache/
      - ./repo/:/site/:ro
    working_dir: /site/
    env_file: [environment/mysql.env, environment/site.env]
    networks: [site, db]
    depends_on: [base, db, redis]
  bridged:
    build:
      context: .
      dockerfile: ./bridged/Dockerfile
    image: ninjaclasher/dmoj-bridged
    init: true
    restart: unless-stopped
    volumes:
      - pdfcache:/pdfcache/
      - ./problems/:/problems/
      - ./repo/:/site/:ro
    working_dir: /site/
    env_file: [environment/mysql.env, environment/site.env]
    networks: [site, db]
    depends_on: [base, db, redis]
  judge-tier3-1:
    <<: *judge-tier3-base
    build:
      context: .
      dockerfile: ./judge-tier3-1/Dockerfile
    image: areslolxd/dmoj-judge-tier3
    volumes:
      - ./problems/:/problems/:ro
      - ./judge-tier3-1/judge.yml:/judge-config/judge.yml:ro
  wsevent:
    build:
      context: .
      dockerfile: ./wsevent/Dockerfile
    image: ninjaclasher/dmoj-wsevent
    init: true
    restart: unless-stopped
    volumes:
      - ./repo/:/app/site/
    working_dir: /app/site
    env_file: [environment/mysql.env, environment/site.env]
    networks: [site, nginx]
  nginx:
    container_name: dmoj_nginx
    image: nginx:alpine
    restart: always
    ports:
      - 127.0.0.1:8080:80
    volumes:
      - assets:/assets/
      - pdfcache:/pdfcache/
      - datacache:/datacache/
      - cache:/cache/
      - ./media/:/media/
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks: [nginx]
    depends_on: [site, wsevent]
networks:
  site:
  db:
  nginx:
volumes:
  assets:
  pdfcache:
  datacache:
  cache:
